<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — Club Sauna</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0A0A0A;
      color: #F0EAD6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 400;
      color: #F0EAD6;
      margin-bottom: 56px;
      letter-spacing: 0.04em;
    }
    .logo span { color: #C17F3A; font-style: italic; }
    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-style: italic;
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      color: #F0EAD6;
      line-height: 1.05;
      margin-bottom: 20px;
    }
    h1 span { color: #C17F3A; }
    p {
      font-size: 0.95rem;
      font-weight: 300;
      color: rgba(240,234,214,0.45);
      max-width: 360px;
      line-height: 1.8;
      margin-bottom: 40px;
    }
    a {
      color: rgba(193,127,58,0.6);
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-decoration: none;
    }
    a:hover { color: #C17F3A; }
  </style>
</head>
<body>
  <div class="logo">Club <span>Sauna</span></div>
  <h1>We'll be in <span>touch.</span></h1>
  <p>Your inquiry is on its way. We'll reach out within 24 hours to talk through the details.</p>
  <a href="/">← Back to Club Sauna</a>
</body>
</html>
